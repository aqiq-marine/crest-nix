name: nix-build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build flake
        run: |
          nix build .#default --no-substitute --show-trace

      - name: Show logs
        if: failure()
        run: |
          drv=$(ls /nix/store/*tblite-*.drv | head -n1)
          echo "log for $drv"
          nix log "$drv"

      - name: Run binary
        run: |
          ./result/bin/crest --help || true
