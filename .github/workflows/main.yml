name: nix-build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build flake
        run: |
          nix build .#default --print-build-logs --show-trace -L

      - name: Run binary
        run: |
          ./result/bin/crest --help || true
